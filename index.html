<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
        }
        body {
            background: #f1f5f9;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 20px;
            direction: rtl;
        }
        .container {
            max-width: 800px;
            width: 100%;
            background: #ffffff;
            border-radius: 32px;
            padding: 30px 25px;
            box-shadow: 0 20px 40px -10px rgba(0,0,0,0.08);
        }
        h1 {
            text-align: center;
            font-weight: 400;
            font-size: 1.8rem;
            color: #0f172a;
            margin-top: 0;
            margin-bottom: 25px;
            border-bottom: 2px dashed #d1d9e6;
            padding-bottom: 18px;
        }
        .table-wrap {
            overflow-x: auto;
            border-radius: 18px;
            border: 1px solid #e2e8f0;
            background: #fafcfd;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.95rem;
        }
        th {
            background: #f1f5f9;
            color: #1e293b;
            font-weight: 600;
            padding: 14px 12px;
            text-align: right;
            border-bottom: 2px solid #d1d9e6;
        }
        td {
            padding: 12px 12px;
            border-bottom: 1px solid #e2e8f0;
            color: #1e293b;
        }
        tr:last-child td {
            border-bottom: none;
        }
        .empty-row td {
            color: #94a3b8;
            text-align: center;
            padding: 20px 12px;
            font-style: italic;
        }
        .row-number {
            font-weight: 600;
            color: #1e293b;
            text-align: center;
            width: 60px;
        }
        .public-badge {
            background: #dcfce7;
            color: #166534;
            padding: 4px 16px;
            border-radius: 40px;
            font-size: 0.8rem;
            display: inline-block;
            margin-bottom: 10px;
        }
        .footer-note {
            text-align: center;
            color: #64748b;
            font-size: 0.85rem;
            margin-top: 20px;
            border-top: 1px solid #e9edf4;
            padding-top: 18px;
        }
        .qr-info {
            background: #f8fafc;
            border: 1px dashed #94a3b8;
            border-radius: 12px;
            padding: 12px;
            text-align: center;
            margin-top: 15px;
            color: #475569;
            font-size: 0.9rem;
        }
        @media (max-width: 480px) {
            .container { padding: 15px 12px; }
        }
    </style>
</head>
<body>
<div class="container">
    <div style="text-align: center;">
        <span class="public-badge"> اسامی داوطلبان نمایندگی مجمع عمومی عادی و فوق العاده</span>
    </div>
    <h1></h1>
    <div class="table-wrap">
        <table>
            <thead>
                <tr><th>ردیف</th><th>نام</th><th>نام‌خانوادگی</th></tr>
            </thead>
            <tbody id="tableBody">
                <!-- ردیف‌ها به صورت داینامیک -->
            </tbody>
        </table>
    </div>
    <div class="qr-info">
        🔄 این صفحه به‌صورت خودکار با داده‌های پنل مدیریت به‌روز می‌شود
    </div>
    <div class="footer-note">
    </div>
</div>

<script>
    (function() {
        const tbody = document.getElementById('tableBody');
        const STORAGE_KEY = 'tableData';

        function loadData() {
            const stored = localStorage.getItem(STORAGE_KEY);
            if (stored) {
                try {
                    return JSON.parse(stored);
                } catch (e) {
                    return [];
                }
            }
            return [];
        }

        function renderTable() {
            const data = loadData();
            tbody.innerHTML = '';

            if (data.length === 0) {
                const tr = document.createElement('tr');
                tr.className = 'empty-row';
                const td = document.createElement('td');
                td.colSpan = 3;
                td.textContent = '— داده‌ای وجود ندارد —';
                tr.appendChild(td);
                tbody.appendChild(tr);
                return;
            }

            // مرتب‌سازی بر اساس نام‌خانوادگی
            const persianAlphabet = 'آابپتثجچحخدذرزژسشصضطظعغفقکگلمنوهی';
            data.sort((a, b) => {
                const firstCharA = a.lastName.charAt(0);
                const firstCharB = b.lastName.charAt(0);
                const indexA = persianAlphabet.indexOf(firstCharA);
                const indexB = persianAlphabet.indexOf(firstCharB);
                if (indexA !== -1 && indexB !== -1) {
                    return indexA - indexB;
                }
                return a.lastName.localeCompare(b.lastName);
            });

            data.forEach((item, index) => {
                const tr = document.createElement('tr');
                
                const tdNumber = document.createElement('td');
                tdNumber.className = 'row-number';
                tdNumber.textContent = index + 1;
                
                const tdName = document.createElement('td');
                tdName.textContent = item.firstName || '—';
                
                const tdLast = document.createElement('td');
                tdLast.textContent = item.lastName || '—';

                tr.appendChild(tdNumber);
                tr.appendChild(tdName);
                tr.appendChild(tdLast);
                tbody.appendChild(tr);
            });
        }

        // بارگذاری اولیه
        renderTable();

        // به‌روزرسانی خودکار هر 2 ثانیه (برای هماهنگی با صفحه مدیریت)
        setInterval(renderTable, 2000);
    })();
</script>

</body>
</html>
