<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اسامی داوطلبان نمایندگی مجمع عمومی عادی و فوق العاده</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
        }
        body {
            background: #f1f5f9;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 20px;
            direction: rtl;
        }
        .container {
            max-width: 800px;
            width: 100%;
            background: #ffffff;
            border-radius: 32px;
            padding: 30px 25px;
            box-shadow: 0 20px 40px -10px rgba(0,0,0,0.08);
        }
        h1 {
            text-align: center;
            font-weight: 400;
            font-size: 1.8rem;
            color: #0f172a;
            margin-top: 0;
            margin-bottom: 25px;
            border-bottom: 2px dashed #d1d9e6;
            padding-bottom: 18px;
        }
        .table-wrap {
            overflow-x: auto;
            border-radius: 18px;
            border: 1px solid #e2e8f0;
            background: #fafcfd;
            margin-bottom: 20px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.95rem;
        }
        th {
            background: #f1f5f9;
            color: #1e293b;
            font-weight: 600;
            padding: 14px 12px;
            text-align: right;
            border-bottom: 2px solid #d1d9e6;
        }
        td {
            padding: 12px 12px;
            border-bottom: 1px solid #e2e8f0;
            color: #1e293b;
        }
        tr:last-child td {
            border-bottom: none;
        }
        .empty-row td {
            color: #94a3b8;
            text-align: center;
            padding: 20px 12px;
            font-style: italic;
        }
        .row-number {
            font-weight: 600;
            color: #1e293b;
            text-align: center;
            width: 60px;
        }
        .actions {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 12px 8px;
            margin-top: 5px;
        }
        .input-group {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 8px;
            flex: 2 1 200px;
        }
        .input-group input {
            flex: 1 1 80px;
            padding: 10px 14px;
            border: 1px solid #d1d9e6;
            border-radius: 40px;
            font-size: 0.9rem;
            background: white;
            transition: 0.2s;
            outline: none;
            min-width: 70px;
        }
        .input-group input:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59,130,246,0.12);
        }
        .btn {
            background: white;
            border: 1px solid #d1d9e6;
            padding: 10px 22px;
            border-radius: 40px;
            font-weight: 500;
            font-size: 0.9rem;
            color: #1e293b;
            cursor: pointer;
            transition: 0.15s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            background: #f8fafc;
            white-space: nowrap;
        }
        .btn-primary {
            background: #1e293b;
            border: 1px solid #1e293b;
            color: white;
        }
        .btn-primary:hover {
            background: #0f172a;
            border-color: #0f172a;
        }
        .btn-primary:active {
            transform: scale(0.96);
        }
        .footer-note {
            text-align: center;
            color: #64748b;
            font-size: 0.85rem;
            margin-top: 20px;
            border-top: 1px solid #e9edf4;
            padding-top: 18px;
        }
        @media (max-width: 480px) {
            .container { padding: 15px 12px; }
        }
    </style>
</head>
<body>
<div class="container">
    <h1>اسامی داوطلبان نمایندگی مجمع عمومی عادی و فوق العاده</h1>
    <div class="table-wrap">
        <table id="mainTable">
            <thead>
                <tr><th>ردیف</th><th>نام</th><th>نام‌خانوادگی</th></tr>
            </thead>
            <tbody id="tableBody">
                <!-- ردیف‌ها به صورت داینامیک -->
            </tbody>
        </table>
    </div>
    <div class="actions">
        <div class="input-group">
            <input type="text" id="firstName" placeholder="نام" aria-label="نام">
            <input type="text" id="lastName" placeholder="نام‌خانوادگی" aria-label="نام‌خانوادگی">
        </div>
        <button class="btn btn-primary" id="addBtn">➕ افزودن</button>
    </div>
    <div class="footer-note">
        به مجمع عمومی عادی و فوق العاده شرکت تعاونی اعتبار کارکنان وزارت جهاد کشاورزی خوش آمدید
    </div>
</div>

<script>
    (function() {
        const tbody = document.getElementById('tableBody');
        const firstNameInput = document.getElementById('firstName');
        const lastNameInput = document.getElementById('lastName');
        const addBtn = document.getElementById('addBtn');

        // ----- تابع سورت کردن ردیف‌ها بر اساس نام‌خانوادگی (الفبای فارسی) -----
        function sortRows() {
            // گرفتن تمام ردیف‌های غیر از empty-row
            const rows = Array.from(tbody.querySelectorAll('tr:not(.empty-row)'));

            if (rows.length === 0) {
                // اگر ردیفی وجود نداشت، مطمئن شویم empty-row نمایش داده شود
                showEmptyMessage();
                return;
            }

            // مرتب‌سازی بر اساس نام‌خانوادگی (ستون دوم - index 1)
            rows.sort((a, b) => {
                const lastNameA = a.querySelectorAll('td')[1]?.textContent.trim() || '';
                const lastNameB = b.querySelectorAll('td')[1]?.textContent.trim() || '';
                // مقایسه الفبایی (برای حروف فارسی)
                return lastNameA.localeCompare(lastNameB, 'fa', { sensitivity: 'base' });
            });

            // حذف empty-row اگر وجود داشته باشد
            const emptyRow = tbody.querySelector('.empty-row');
            if (emptyRow) emptyRow.remove();

            // اضافه کردن ردیف‌های مرتب‌شده به tbody
            rows.forEach(row => tbody.appendChild(row));

            // شماره‌گذاری مجدد
            renumberRows();
        }

        // ----- شماره‌گذاری از ۱ -----
        function renumberRows() {
            const rows = tbody.querySelectorAll('tr:not(.empty-row)');
            rows.forEach((row, index) => {
                const numberCell = row.querySelector('td:first-child');
                if (numberCell) {
                    numberCell.textContent = index + 1;
                }
            });

            // اگر ردیفی وجود نداشت، پیام خالی نمایش داده شود
            if (rows.length === 0) {
                showEmptyMessage();
            }
        }

        // ----- نمایش پیام خالی بودن جدول -----
        function showEmptyMessage() {
            // اگر already exists, برمی‌گردیم
            if (tbody.querySelector('.empty-row')) return;

            const tr = document.createElement('tr');
            tr.className = 'empty-row';
            const td = document.createElement('td');
            td.colSpan = 3;
            td.textContent = '— سطری وجود ندارد —';
            tr.appendChild(td);
            tbody.appendChild(tr);
        }

        // ----- افزودن ردیف جدید (با سورت خودکار) -----
        function addRow(firstName, lastName) {
            // حذف پیام خالی (اگر وجود داشته باشد)
            const emptyRow = tbody.querySelector('.empty-row');
            if (emptyRow) emptyRow.remove();

            // ایجاد ردیف جدید
            const tr = document.createElement('tr');
            
            // ستون شماره (موقتاً ۰)
            const tdNumber = document.createElement('td');
            tdNumber.className = 'row-number';
            tdNumber.textContent = '۰';
            
            // ستون نام
            const tdName = document.createElement('td');
            tdName.textContent = firstName || '—';
            
            // ستون نام‌خانوادگی
            const tdLast = document.createElement('td');
            tdLast.textContent = lastName || '—';

            tr.appendChild(tdNumber);
            tr.appendChild(tdName);
            tr.appendChild(tdLast);
            
            // اضافه کردن ردیف به tbody
            tbody.appendChild(tr);

            // سورت کردن و شماره‌گذاری مجدد
            sortRows();
        }

        // ----- افزودن از ورودی‌ها -----
        function addFromInputs() {
            const firstName = firstNameInput.value.trim();
            const lastName = lastNameInput.value.trim();
            if (!firstName && !lastName) {
                alert('لطفاً حداقل یکی از فیلدها را پر کنید.');
                return;
            }
            addRow(firstName, lastName);
            // پاک کردن ورودی‌ها
            firstNameInput.value = '';
            lastNameInput.value = '';
            firstNameInput.focus();
        }

        // ----- رویدادها -----
        addBtn.addEventListener('click', addFromInputs);
        firstNameInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                addFromInputs();
            }
        });
        lastNameInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                addFromInputs();
            }
        });

        // ----- مقداردهی اولیه با چند ردیف نمونه -----
        function initSample() {
            const sampleData = [

            ];
            // اضافه کردن ردیف‌ها (سورت خودکار انجام می‌شود)
            sampleData.forEach(([f, l]) => {
                const emptyRow = tbody.querySelector('.empty-row');
                if (emptyRow) emptyRow.remove();
                
                const tr = document.createElement('tr');
                const tdNumber = document.createElement('td');
                tdNumber.className = 'row-number';
                tdNumber.textContent = '۰';
                const tdName = document.createElement('td');
                tdName.textContent = f;
                const tdLast = document.createElement('td');
                tdLast.textContent = l;
                tr.appendChild(tdNumber);
                tr.appendChild(tdName);
                tr.appendChild(tdLast);
                tbody.appendChild(tr);
            });
            
            // مرتب‌سازی و شماره‌گذاری
            sortRows();
        }

        // راه‌اندازی
        initSample();
    })();
</script>

</body>
</html>
