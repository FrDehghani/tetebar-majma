<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>پنل مدیریت</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
        }
        body {
            background: #f1f5f9;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 20px;
            direction: rtl;
        }
        .container {
            max-width: 800px;
            width: 100%;
            background: #ffffff;
            border-radius: 32px;
            padding: 30px 25px;
            box-shadow: 0 20px 40px -10px rgba(0,0,0,0.08);
        }
        h1 {
            text-align: center;
            font-weight: 400;
            font-size: 1.8rem;
            color: #0f172a;
            margin-top: 0;
            margin-bottom: 25px;
            border-bottom: 2px dashed #d1d9e6;
            padding-bottom: 18px;
        }
        .table-wrap {
            overflow-x: auto;
            border-radius: 18px;
            border: 1px solid #e2e8f0;
            background: #fafcfd;
            margin-bottom: 20px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.95rem;
        }
        th {
            background: #f1f5f9;
            color: #1e293b;
            font-weight: 600;
            padding: 14px 12px;
            text-align: right;
            border-bottom: 2px solid #d1d9e6;
        }
        td {
            padding: 12px 12px;
            border-bottom: 1px solid #e2e8f0;
            color: #1e293b;
        }
        tr:last-child td {
            border-bottom: none;
        }
        .empty-row td {
            color: #94a3b8;
            text-align: center;
            padding: 20px 12px;
            font-style: italic;
        }
        .row-number {
            font-weight: 600;
            color: #1e293b;
            text-align: center;
            width: 60px;
        }
        .actions {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 12px 8px;
            margin-top: 5px;
        }
        .input-group {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 8px;
            flex: 2 1 200px;
        }
        .input-group input {
            flex: 1 1 80px;
            padding: 10px 14px;
            border: 1px solid #d1d9e6;
            border-radius: 40px;
            font-size: 0.9rem;
            background: white;
            transition: 0.2s;
            outline: none;
            min-width: 70px;
        }
        .input-group input:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59,130,246,0.12);
        }
        .btn {
            background: white;
            border: 1px solid #d1d9e6;
            padding: 10px 22px;
            border-radius: 40px;
            font-weight: 500;
            font-size: 0.9rem;
            color: #1e293b;
            cursor: pointer;
            transition: 0.15s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            background: #f8fafc;
            white-space: nowrap;
        }
        .btn-primary {
            background: #1e293b;
            border: 1px solid #1e293b;
            color: white;
        }
        .btn-primary:hover {
            background: #0f172a;
            border-color: #0f172a;
        }
        .btn-primary:active {
            transform: scale(0.96);
        }
        .btn-danger {
            background: #fef2f2;
            border: 1px solid #fecaca;
            color: #b91c1c;
            padding: 6px 14px;
            font-size: 0.8rem;
            border-radius: 30px;
            cursor: pointer;
        }
        .btn-danger:hover {
            background: #fee2e2;
        }
        .footer-note {
            text-align: center;
            color: #64748b;
            font-size: 0.85rem;
            margin-top: 20px;
            border-top: 1px solid #e9edf4;
            padding-top: 18px;
        }
        .admin-badge {
            background: #dbeafe;
            color: #1e40af;
            padding: 4px 16px;
            border-radius: 40px;
            font-size: 0.8rem;
            display: inline-block;
            margin-bottom: 10px;
        }
        @media (max-width: 480px) {
            .container { padding: 15px 12px; }
        }
    </style>
</head>
<body>
<div class="container">
    <div style="text-align: center;">
        <span class="admin-badge">🔐 پنل مدیریت</span>
    </div>
    <h1>اسامی داوطلبین</h1>
    <div class="table-wrap">
        <table id="mainTable">
            <thead>
                <tr><th>ردیف</th><th>نام</th><th>نام‌خانوادگی</th><th style="width:80px;">عملیات</th></tr>
            </thead>
            <tbody id="tableBody">
                <!-- ردیف‌ها به صورت داینامیک -->
            </tbody>
        </table>
    </div>
    <div class="actions">
        <div class="input-group">
            <input type="text" id="firstName" placeholder="نام" aria-label="نام">
            <input type="text" id="lastName" placeholder="نام‌خانوادگی" aria-label="نام‌خانوادگی">
        </div>
        <button class="btn btn-primary" id="addBtn">➕ افزودن</button>
        
    </div>
    <div class="footer-note">
        داده‌ها به‌صورت خودکار در مرورگر ذخیره می‌شوند · صفحه عمومی: index.html
    </div>
</div>

<script>
    (function() {
        const tbody = document.getElementById('tableBody');
        const firstNameInput = document.getElementById('firstName');
        const lastNameInput = document.getElementById('lastName');
        const addBtn = document.getElementById('addBtn');
        const clearBtn = document.getElementById('clearBtn');

        // کلید ذخیره‌سازی در LocalStorage
        const STORAGE_KEY = 'tableData';

        // ----- بارگذاری داده از LocalStorage -----
        function loadData() {
            const stored = localStorage.getItem(STORAGE_KEY);
            if (stored) {
                try {
                    return JSON.parse(stored);
                } catch (e) {
                    return [];
                }
            }
            return [];
        }

        // ----- ذخیره داده در LocalStorage -----
        function saveData(data) {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
        }

        // ----- نمایش داده‌ها در جدول -----
        function renderTable() {
            const data = loadData();
            
            // پاک کردن جدول (به جز هدر)
            tbody.innerHTML = '';

            if (data.length === 0) {
                const tr = document.createElement('tr');
                tr.className = 'empty-row';
                const td = document.createElement('td');
                td.colSpan = 4;
                td.textContent = '— سطری وجود ندارد —';
                tr.appendChild(td);
                tbody.appendChild(tr);
                return;
            }

            // مرتب‌سازی بر اساس نام‌خانوادگی
            const persianAlphabet = 'آابپتثجچحخدذرزژسشصضطظعغفقکگلمنوهی';
            data.sort((a, b) => {
                const firstCharA = a.lastName.charAt(0);
                const firstCharB = b.lastName.charAt(0);
                const indexA = persianAlphabet.indexOf(firstCharA);
                const indexB = persianAlphabet.indexOf(firstCharB);
                if (indexA !== -1 && indexB !== -1) {
                    return indexA - indexB;
                }
                return a.lastName.localeCompare(b.lastName);
            });

            // نمایش ردیف‌ها
            data.forEach((item, index) => {
                const tr = document.createElement('tr');
                
                const tdNumber = document.createElement('td');
                tdNumber.className = 'row-number';
                tdNumber.textContent = index + 1;
                
                const tdName = document.createElement('td');
                tdName.textContent = item.firstName || '—';
                
                const tdLast = document.createElement('td');
                tdLast.textContent = item.lastName || '—';
                
                const tdAction = document.createElement('td');
                tdAction.style.textAlign = 'left';
                const deleteBtn = document.createElement('button');
                deleteBtn.className = 'btn-danger';
                deleteBtn.textContent = '✕';
                deleteBtn.style.padding = '4px 12px';
                deleteBtn.style.border = 'none';
                deleteBtn.style.borderRadius = '30px';
                deleteBtn.style.cursor = 'pointer';
                deleteBtn.addEventListener('click', function() {
                    deleteRow(index);
                });
                tdAction.appendChild(deleteBtn);

                tr.appendChild(tdNumber);
                tr.appendChild(tdName);
                tr.appendChild(tdLast);
                tr.appendChild(tdAction);
                tbody.appendChild(tr);
            });
        }

        // ----- حذف یک ردیف -----
        function deleteRow(index) {
            const data = loadData();
            data.splice(index, 1);
            saveData(data);
            renderTable();
        }

        // ----- افزودن ردیف جدید -----
        function addRow(firstName, lastName) {
            const data = loadData();
            data.push({ firstName, lastName });
            saveData(data);
            renderTable();
            firstNameInput.value = '';
            lastNameInput.value = '';
            firstNameInput.focus();
        }

        // ----- افزودن از ورودی‌ها -----
        function addFromInputs() {
            const firstName = firstNameInput.value.trim();
            const lastName = lastNameInput.value.trim();
            if (!firstName && !lastName) {
                alert('لطفاً حداقل یکی از فیلدها را پر کنید.');
                return;
            }
            addRow(firstName, lastName);
        }

        // ----- حذف همه داده‌ها -----
        function clearAll() {
            if (confirm('آیا مطمئن هستید که می‌خواهید همه داده‌ها را حذف کنید؟')) {
                saveData([]);
                renderTable();
            }
        }

        // ----- رویدادها -----
        addBtn.addEventListener('click', addFromInputs);
        clearBtn.addEventListener('click', clearAll);
        firstNameInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                addFromInputs();
            }
        });
        lastNameInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                addFromInputs();
            }
        });

        // ----- مقداردهی اولیه با داده‌های نمونه (اگر خالی باشد) -----
        function initSampleData() {
            const data = loadData();
            if (data.length === 0) {
                const samples = [
                    { firstName: 'علی', lastName: 'محمدی' },
                    { firstName: 'سارا', lastName: 'احمدی' },
                    { firstName: 'رضا', lastName: 'کریمی' },
                    { firstName: 'نازنین', lastName: 'زارعی' }
                ];
                saveData(samples);
            }
            renderTable();
        }

        initSampleData();
    })();
</script>

<script>
    // ========== تنظیمات GitHub ==========
    // 🔴 این مقادیر را با اطلاعات خود جایگزین کنید
    const GITHUB_TOKEN = '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';
    const REPO_OWNER = 'FrDehghani';
    const REPO_NAME = 'tetebar-majma';
    const ISSUE_LABEL = 'table';          // برچسب برای پیدا کردن Issue
    // =====================================

    // کلید ذخیره‌سازی محلی (برای Fallback)
    const STORAGE_KEY = 'tableData';
    let currentData = [];

    // ========== توابع GitHub Issues ==========
    
    // پیدا کردن Issue با برچسب مشخص
    async function findDataIssue() {
        const url = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/issues?labels=${ISSUE_LABEL}&state=all`;
        const response = await fetch(url, {
            headers: {
                'Authorization': `token ${GITHUB_TOKEN}`,
                'Accept': 'application/vnd.github.v3+json'
            }
        });
        if (!response.ok) {
            throw new Error('خطا در دریافت Issues');
        }
        const issues = await response.json();
        return issues.length > 0 ? issues[0] : null;
    }

    // ایجاد Issue جدید
    async function createDataIssue(data) {
        const url = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/issues`;
        const response = await fetch(url, {
            method: 'POST',
            headers: {
                'Authorization': `token ${GITHUB_TOKEN}`,
                'Content-Type': 'application/json',
                'Accept': 'application/vnd.github.v3+json'
            },
            body: JSON.stringify({
                title: 'Table Data Storage',
                body: JSON.stringify(data, null, 2),
                labels: [ISSUE_LABEL]
            })
        });
        if (!response.ok) {
            throw new Error('خطا در ایجاد Issue');
        }
        return await response.json();
    }

    // به‌روزرسانی Issue موجود
    async function updateDataIssue(issueNumber, data) {
        const url = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/issues/${issueNumber}`;
        const response = await fetch(url, {
            method: 'PATCH',
            headers: {
                'Authorization': `token ${GITHUB_TOKEN}`,
                'Content-Type': 'application/json',
                'Accept': 'application/vnd.github.v3+json'
            },
            body: JSON.stringify({
                body: JSON.stringify(data, null, 2)
            })
        });
        if (!response.ok) {
            throw new Error('خطا در به‌روزرسانی Issue');
        }
        return await response.json();
    }

    // بارگذاری داده از GitHub
    async function loadFromGitHub() {
        try {
            const issue = await findDataIssue();
            if (issue) {
                const data = JSON.parse(issue.body);
                return data;
            }
            return null;
        } catch (error) {
            console.error('خطا در بارگذاری از GitHub:', error);
            return null;
        }
    }

    // ذخیره داده در GitHub
    async function saveToGitHub(data) {
        try {
            const issue = await findDataIssue();
            if (issue) {
                await updateDataIssue(issue.number, data);
            } else {
                await createDataIssue(data);
            }
            return true;
        } catch (error) {
            console.error('خطا در ذخیره در GitHub:', error);
            return false;
        }
    }

    // ========== توابع مدیریت داده‌ها ==========

    function loadLocalData() {
        const stored = localStorage.getItem(STORAGE_KEY);
        if (stored) {
            try { return JSON.parse(stored); } 
            catch (e) { return []; }
        }
        return [];
    }

    function saveLocalData(data) {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    }

    function renderTable() {
        const tbody = document.getElementById('tableBody');
        const data = currentData;
        tbody.innerHTML = '';

        if (data.length === 0) {
            const tr = document.createElement('tr');
            tr.className = 'empty-row';
            const td = document.createElement('td');
            td.colSpan = 4;
            td.textContent = '— سطری وجود ندارد —';
            tr.appendChild(td);
            tbody.appendChild(tr);
            return;
        }

        const persianAlphabet = 'آابپتثجچحخدذرزژسشصضطظعغفقکگلمنوهی';
        data.sort((a, b) => {
            const firstCharA = a.lastName?.charAt(0) || '';
            const firstCharB = b.lastName?.charAt(0) || '';
            const indexA = persianAlphabet.indexOf(firstCharA);
            const indexB = persianAlphabet.indexOf(firstCharB);
            if (indexA !== -1 && indexB !== -1) {
                return indexA - indexB;
            }
            return (a.lastName || '').localeCompare(b.lastName || '');
        });

        data.forEach((item, index) => {
            const tr = document.createElement('tr');
            
            const tdNumber = document.createElement('td');
            tdNumber.className = 'row-number';
            tdNumber.textContent = index + 1;
            
            const tdName = document.createElement('td');
            tdName.textContent = item.firstName || '—';
            
            const tdLast = document.createElement('td');
            tdLast.textContent = item.lastName || '—';
            
            const tdAction = document.createElement('td');
            tdAction.style.textAlign = 'left';
            const deleteBtn = document.createElement('button');
            deleteBtn.className = 'btn-danger';
            deleteBtn.textContent = '✕';
            deleteBtn.style.padding = '4px 12px';
            deleteBtn.style.borderRadius = '30px';
            deleteBtn.style.cursor = 'pointer';
            deleteBtn.addEventListener('click', function() {
                deleteRow(index);
            });
            tdAction.appendChild(deleteBtn);

            tr.appendChild(tdNumber);
            tr.appendChild(tdName);
            tr.appendChild(tdLast);
            tr.appendChild(tdAction);
            tbody.appendChild(tr);
        });
    }

    function deleteRow(index) {
        currentData.splice(index, 1);
        saveLocalData(currentData);
        saveToGitHub(currentData);
        renderTable();
        updateStatus('✅ همگام‌سازی شد', 'success');
    }

    function addRow(firstName, lastName) {
        currentData.push({ firstName, lastName });
        saveLocalData(currentData);
        saveToGitHub(currentData);
        renderTable();
        updateStatus('✅ همگام‌سازی شد', 'success');
    }

    function addFromInputs() {
        const firstName = document.getElementById('firstName').value.trim();
        const lastName = document.getElementById('lastName').value.trim();
        if (!firstName && !lastName) {
            alert('لطفاً حداقل یکی از فیلدها را پر کنید.');
            return;
        }
        addRow(firstName, lastName);
        document.getElementById('firstName').value = '';
        document.getElementById('lastName').value = '';
        document.getElementById('firstName').focus();
    }

    function clearAll() {
        if (confirm('آیا مطمئن هستید که می‌خواهید همه داده‌ها را حذف کنید؟')) {
            currentData = [];
            saveLocalData(currentData);
            saveToGitHub(currentData);
            renderTable();
            updateStatus('✅ همگام‌سازی شد', 'success');
        }
    }

    function updateStatus(message, type = 'success') {
        const statusEl = document.getElementById('syncStatus');
        statusEl.textContent = message;
        statusEl.className = 'sync-status';
        if (type === 'error') {
            statusEl.classList.add('error');
        }
    }

    // ========== همگام‌سازی ==========

    async function syncWithGitHub() {
        updateStatus('🔄 در حال همگام‌سازی...', '');
        try {
            const data = await loadFromGitHub();
            if (data !== null) {
                currentData = data;
                saveLocalData(data);
                renderTable();
                updateStatus('✅ همگام‌سازی شد', 'success');
            } else {
                // اگر داده‌ای در GitHub نبود، داده‌های محلی را به GitHub بفرست
                const localData = loadLocalData();
                if (localData.length > 0) {
                    await saveToGitHub(localData);
                    currentData = localData;
                    renderTable();
                    updateStatus('✅ داده‌ها به GitHub ارسال شد', 'success');
                } else {
                    // هر دو خالی هستند
                    currentData = [];
                    renderTable();
                    updateStatus('📭 داده‌ای وجود ندارد', '');
                }
            }
        } catch (error) {
            console.error('خطا:', error);
            updateStatus('❌ خطا در همگام‌سازی', 'error');
            // Fallback به داده‌های محلی
            currentData = loadLocalData();
            renderTable();
        }
    }

    // ========== رویدادها ==========

    document.getElementById('addBtn').addEventListener('click', addFromInputs);
    document.getElementById('clearBtn').addEventListener('click', clearAll);
    document.getElementById('syncBtn').addEventListener('click', syncWithGitHub);

    document.getElementById('firstName').addEventListener('keydown', (e) => {
        if (e.key === 'Enter') { e.preventDefault(); addFromInputs(); }
    });
    document.getElementById('lastName').addEventListener('keydown', (e) => {
        if (e.key === 'Enter') { e.preventDefault(); addFromInputs(); }
    });

    // ========== راه‌اندازی اولیه ==========

    async function init() {
        updateStatus('🔄 اتصال به GitHub...', '');
        
        // ابتدا از GitHub بخوان
        try {
            const data = await loadFromGitHub();
            if (data !== null && data.length > 0) {
                currentData = data;
                saveLocalData(data);
                renderTable();
                updateStatus('✅ داده از GitHub بارگذاری شد', 'success');
            } else {
                // اگر GitHub خالی بود، از LocalStorage بخوان
                const localData = loadLocalData();
                if (localData.length > 0) {
                    currentData = localData;
                    await saveToGitHub(localData);
                    renderTable();
                    updateStatus('✅ داده‌ها به GitHub ارسال شد', 'success');
                } else {
                    // اگر هیچ داده‌ای نبود، نمونه‌ها را اضافه کن
                    const samples = [
                        { firstName: 'علی', lastName: 'محمدی' },
                        { firstName: 'سارا', lastName: 'احمدی' },
                        { firstName: 'رضا', lastName: 'کریمی' },
                        { firstName: 'نازنین', lastName: 'زارعی' }
                    ];
                    currentData = samples;
                    saveLocalData(samples);
                    await saveToGitHub(samples);
                    renderTable();
                    updateStatus('✅ داده‌های نمونه ایجاد شد', 'success');
                }
            }
        } catch (error) {
            console.error('خطا در راه‌اندازی:', error);
            updateStatus('⚠️ استفاده از داده‌های محلی', 'error');
            currentData = loadLocalData();
            if (currentData.length === 0) {
                const samples = [
                    { firstName: 'علی', lastName: 'محمدی' },
                    { firstName: 'سارا', lastName: 'احمدی' }
                ];
                currentData = samples;
                saveLocalData(samples);
            }
            renderTable();
        }
    }

    init();
</script>

    
</body>
</html>
