<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>پنل مدیریت</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
        }
        body {
            background: #f1f5f9;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 20px;
            direction: rtl;
        }
        .container {
            max-width: 800px;
            width: 100%;
            background: #ffffff;
            border-radius: 32px;
            padding: 30px 25px;
            box-shadow: 0 20px 40px -10px rgba(0,0,0,0.08);
        }
        h1 {
            text-align: center;
            font-weight: 400;
            font-size: 1.8rem;
            color: #0f172a;
            margin-top: 0;
            margin-bottom: 25px;
            border-bottom: 2px dashed #d1d9e6;
            padding-bottom: 18px;
        }
        .table-wrap {
            overflow-x: auto;
            border-radius: 18px;
            border: 1px solid #e2e8f0;
            background: #fafcfd;
            margin-bottom: 20px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.95rem;
        }
        th {
            background: #f1f5f9;
            color: #1e293b;
            font-weight: 600;
            padding: 14px 12px;
            text-align: right;
            border-bottom: 2px solid #d1d9e6;
        }
        td {
            padding: 12px 12px;
            border-bottom: 1px solid #e2e8f0;
            color: #1e293b;
        }
        tr:last-child td {
            border-bottom: none;
        }
        .empty-row td {
            color: #94a3b8;
            text-align: center;
            padding: 20px 12px;
            font-style: italic;
        }
        .row-number {
            font-weight: 600;
            color: #1e293b;
            text-align: center;
            width: 60px;
        }
        .actions {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 12px 8px;
            margin-top: 5px;
        }
        .input-group {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 8px;
            flex: 2 1 200px;
        }
        .input-group input {
            flex: 1 1 80px;
            padding: 10px 14px;
            border: 1px solid #d1d9e6;
            border-radius: 40px;
            font-size: 0.9rem;
            background: white;
            transition: 0.2s;
            outline: none;
            min-width: 70px;
        }
        .input-group input:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59,130,246,0.12);
        }
        .btn {
            background: white;
            border: 1px solid #d1d9e6;
            padding: 10px 22px;
            border-radius: 40px;
            font-weight: 500;
            font-size: 0.9rem;
            color: #1e293b;
            cursor: pointer;
            transition: 0.15s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            background: #f8fafc;
            white-space: nowrap;
        }
        .btn-primary {
            background: #1e293b;
            border: 1px solid #1e293b;
            color: white;
        }
        .btn-primary:hover {
            background: #0f172a;
            border-color: #0f172a;
        }
        .btn-primary:active {
            transform: scale(0.96);
        }
        .btn-danger {
            background: #fef2f2;
            border: 1px solid #fecaca;
            color: #b91c1c;
            padding: 6px 14px;
            font-size: 0.8rem;
            border-radius: 30px;
            cursor: pointer;
        }
        .btn-danger:hover {
            background: #fee2e2;
        }
        .footer-note {
            text-align: center;
            color: #64748b;
            font-size: 0.85rem;
            margin-top: 20px;
            border-top: 1px solid #e9edf4;
            padding-top: 18px;
        }
        .admin-badge {
            background: #dbeafe;
            color: #1e40af;
            padding: 4px 16px;
            border-radius: 40px;
            font-size: 0.8rem;
            display: inline-block;
            margin-bottom: 10px;
        }
        @media (max-width: 480px) {
            .container { padding: 15px 12px; }
        }
    </style>
</head>
<body>
<div class="container">
    <div style="text-align: center;">
        <span class="admin-badge">🔐 پنل مدیریت</span>
    </div>
    <h1>اسامی داوطلبین</h1>
    <div class="table-wrap">
        <table id="mainTable">
            <thead>
                <tr><th>ردیف</th><th>نام</th><th>نام‌خانوادگی</th><th style="width:80px;">عملیات</th></tr>
            </thead>
            <tbody id="tableBody">
                <!-- ردیف‌ها به صورت داینامیک -->
            </tbody>
        </table>
    </div>
    <div class="actions">
        <div class="input-group">
            <input type="text" id="firstName" placeholder="نام" aria-label="نام">
            <input type="text" id="lastName" placeholder="نام‌خانوادگی" aria-label="نام‌خانوادگی">
        </div>
        <button class="btn btn-primary" id="addBtn">➕ افزودن</button>
        
    </div>
    <div class="footer-note">
        داده‌ها به‌صورت خودکار در مرورگر ذخیره می‌شوند · صفحه عمومی: index.html
    </div>
</div>

<script>
    (function() {
        const tbody = document.getElementById('tableBody');
        const firstNameInput = document.getElementById('firstName');
        const lastNameInput = document.getElementById('lastName');
        const addBtn = document.getElementById('addBtn');
        const clearBtn = document.getElementById('clearBtn');

        // کلید ذخیره‌سازی در LocalStorage
        const STORAGE_KEY = 'tableData';

        // ----- بارگذاری داده از LocalStorage -----
        function loadData() {
            const stored = localStorage.getItem(STORAGE_KEY);
            if (stored) {
                try {
                    return JSON.parse(stored);
                } catch (e) {
                    return [];
                }
            }
            return [];
        }

        // ----- ذخیره داده در LocalStorage -----
        function saveData(data) {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
        }

        // ----- نمایش داده‌ها در جدول -----
        function renderTable() {
            const data = loadData();
            
            // پاک کردن جدول (به جز هدر)
            tbody.innerHTML = '';

            if (data.length === 0) {
                const tr = document.createElement('tr');
                tr.className = 'empty-row';
                const td = document.createElement('td');
                td.colSpan = 4;
                td.textContent = '— سطری وجود ندارد —';
                tr.appendChild(td);
                tbody.appendChild(tr);
                return;
            }

            // مرتب‌سازی بر اساس نام‌خانوادگی
            const persianAlphabet = 'آابپتثجچحخدذرزژسشصضطظعغفقکگلمنوهی';
            data.sort((a, b) => {
                const firstCharA = a.lastName.charAt(0);
                const firstCharB = b.lastName.charAt(0);
                const indexA = persianAlphabet.indexOf(firstCharA);
                const indexB = persianAlphabet.indexOf(firstCharB);
                if (indexA !== -1 && indexB !== -1) {
                    return indexA - indexB;
                }
                return a.lastName.localeCompare(b.lastName);
            });

            // نمایش ردیف‌ها
            data.forEach((item, index) => {
                const tr = document.createElement('tr');
                
                const tdNumber = document.createElement('td');
                tdNumber.className = 'row-number';
                tdNumber.textContent = index + 1;
                
                const tdName = document.createElement('td');
                tdName.textContent = item.firstName || '—';
                
                const tdLast = document.createElement('td');
                tdLast.textContent = item.lastName || '—';
                
                const tdAction = document.createElement('td');
                tdAction.style.textAlign = 'left';
                const deleteBtn = document.createElement('button');
                deleteBtn.className = 'btn-danger';
                deleteBtn.textContent = '✕';
                deleteBtn.style.padding = '4px 12px';
                deleteBtn.style.border = 'none';
                deleteBtn.style.borderRadius = '30px';
                deleteBtn.style.cursor = 'pointer';
                deleteBtn.addEventListener('click', function() {
                    deleteRow(index);
                });
                tdAction.appendChild(deleteBtn);

                tr.appendChild(tdNumber);
                tr.appendChild(tdName);
                tr.appendChild(tdLast);
                tr.appendChild(tdAction);
                tbody.appendChild(tr);
            });
        }

        // ----- حذف یک ردیف -----
        function deleteRow(index) {
            const data = loadData();
            data.splice(index, 1);
            saveData(data);
            renderTable();
        }

        // ----- افزودن ردیف جدید -----
        function addRow(firstName, lastName) {
            const data = loadData();
            data.push({ firstName, lastName });
            saveData(data);
            renderTable();
            firstNameInput.value = '';
            lastNameInput.value = '';
            firstNameInput.focus();
        }

        // ----- افزودن از ورودی‌ها -----
        function addFromInputs() {
            const firstName = firstNameInput.value.trim();
            const lastName = lastNameInput.value.trim();
            if (!firstName && !lastName) {
                alert('لطفاً حداقل یکی از فیلدها را پر کنید.');
                return;
            }
            addRow(firstName, lastName);
        }

        // ----- حذف همه داده‌ها -----
        function clearAll() {
            if (confirm('آیا مطمئن هستید که می‌خواهید همه داده‌ها را حذف کنید؟')) {
                saveData([]);
                renderTable();
            }
        }

        // ----- رویدادها -----
        addBtn.addEventListener('click', addFromInputs);
        clearBtn.addEventListener('click', clearAll);
        firstNameInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                addFromInputs();
            }
        });
        lastNameInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                addFromInputs();
            }
        });

        // ----- مقداردهی اولیه با داده‌های نمونه (اگر خالی باشد) -----
        function initSampleData() {
            const data = loadData();
            if (data.length === 0) {
                const samples = [
                    { firstName: 'علی', lastName: 'محمدی' },
                    { firstName: 'سارا', lastName: 'احمدی' },
                    { firstName: 'رضا', lastName: 'کریمی' },
                    { firstName: 'نازنین', lastName: 'زارعی' }
                ];
                saveData(samples);
            }
            renderTable();
        }

        initSampleData();
    })();
</script>

</body>
</html>
